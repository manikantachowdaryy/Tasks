<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="search-container">
        <input type="text" id="product-search" placeholder="Search products by title..." />
    </div>

    <div class="controls-container">
        <select id="category-filter" class="filter-select">
            <option value="all">All Categories</option>
            <option value="electronics">electronics</option>
            <option value="jewelery">jewelery</option>
            <option value="men's clothing">men's clothing</option>
            <option value="women's clothing">women's clothing</option>
        </select>
        <button id="sort-low-high" class="sort-btn">Sort Low → High</button>
        <button id="sort-high-low" class="sort-btn">Sort High → Low</button>
    </div>

    <div id="products" class="product-container"></div>

    <div id="detail-modal" class="modal hidden">
        <div class="modal-content">
            <button class="modal-close" id="modal-close">×</button>
            <h2 id="modal-title"></h2>
            <img id="modal-image" src="" alt="Product image" />
            <p id="modal-description"></p>
            <p class="modal-price" id="modal-price"></p>
            <p class="modal-category" id="modal-category"></p>
        </div>
    </div>

    
    <!-- <script src="index.js"></script> -->
    <!-- <script src="./task2.js"></script> -->
    <!-- <script src="task3.js"></script> -->

     <!-- <script src="./task7.js"></script> -->
    <script src="./task8.js"></script>
    <style>
    body {
    font-family: Arial, sans-serif;
    background-color: #f8f9fa;
    margin: 0;
    padding: 0;
}

.search-container {
    max-width: 1200px;
    margin: 20px auto 0;
    padding: 0 20px;
}

#product-search {
    width: 100%;
    max-width: 500px;
    padding: 12px 14px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
}

#product-search:focus {
    border-color: #28a745;
    box-shadow: 0 0 0 4px rgba(40, 167, 69, 0.12);
}

.controls-container {
    max-width: 1200px;
    margin: 10px auto;
    padding: 0 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

.sort-btn {
    background-color: #545a60;
    color: white;
    border: none;
    padding: 10px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.95rem;
    transition: background-color 0.2s ease, transform 0.2s ease;
}

.sort-btn:hover {
    background-color: #282a2c;
    transform: translateY(-1px);
}

.sort-btn.active {
    background-color: #0056b3;
}

.filter-select {
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid #ccc;
    background-color: white;
    font-size: 0.95rem;
    color: #333;
    outline: none;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
}

.filter-select:focus {
    border-color: #878f87;
    box-shadow: 0 0 0 4px rgba(40, 167, 69, 0.12);
}

.card-footer {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    align-items: center;
    margin-top: 10px;
}

.view-btn {
    background-color: #8f7e65;
    color: white;
    border: none;
    padding: 10px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.95rem;
    transition: background-color 0.2s ease, transform 0.2s ease;
}

.view-btn:hover {
    background-color: #544c3f;
    transform: translateY(-1px);
}

.modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    background: rgba(0, 0, 0, 0.5);
    padding: 20px;
    z-index: 1000;
}

.modal.hidden {
    display: none;
}

.modal-content {
    background-color: white;
    border-radius: 12px;
    width: min(600px, 100%);
    padding: 25px;
    box-shadow: 0 16px 40px rgba(0,0,0,0.2);
    position: relative;
}

.modal-close {
    position: absolute;
    top: 15px;
    right: 15px;
    border: none;
    background: transparent;
    font-size: 1.6rem;
    cursor: pointer;
    color: #333;
}

.modal-content img {
    width: 100%;
    max-height: 300px;
    object-fit: contain;
    border-radius: 10px;
    margin: 15px 0;
}

.modal-content p {
    color: #444;
    line-height: 1.6;
}

.modal-price,
.modal-category {
    font-weight: 700;
    margin-top: 10px;
}


.product-container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 20px;
    padding: 20px;
    max-width: 1200px;
    margin: 0 auto;
}


.card {
    background-color: #a8a1a1;
    /* border-radius: 10px; */
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    padding: 15px;
    text-align: center;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    overflow: hidden;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
}

.card h1 {
    font-size: 1.2em;
    margin-bottom: 10px;
    color: #333;
}

.card img {
    max-width: 100%;
    height: 150px;
    object-fit: cover;
    border-radius: 5px;
    margin-bottom: 10px;
}

.card p {
    font-size: 0.9em;
    color: #080707;
    margin-bottom: 15px;
    line-height: 1.4;
}

.price-btn {
    background-color: #63b9da;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 1em;
    transition: background-color 0.3s;
}

.price-btn:hover {
    background-color: #3d4740;
}
    </style>
</body>
</html>
